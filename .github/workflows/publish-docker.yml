name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Optional image tag like 3.2.1 or v3.2.1
        required: false
        type: string
      push_latest:
        description: Also push latest tag
        required: false
        type: boolean
        default: true

env:
  IMAGE_NAME: misiektoja/instagram-monitor

jobs:
  publish-docker:
    name: Build and publish multi-arch image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: resolve_tags
        shell: bash
        run: |
          set -euo pipefail

          base_tag=""
          push_latest="false"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            base_tag="${{ github.event.release.tag_name }}"
            push_latest="true"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            base_tag="${{ github.event.inputs.tag }}"
            push_latest="${{ github.event.inputs.push_latest }}"
          else
            base_tag="${GITHUB_SHA::7}"
            push_latest="${{ github.event.inputs.push_latest }}"
          fi

          if [[ -z "$base_tag" ]]; then
            echo "Failed to resolve image tag" >&2
            exit 1
          fi

          tags=("${IMAGE_NAME}:${base_tag}")

          if [[ "$base_tag" =~ ^v[0-9] ]]; then
            tags+=("${IMAGE_NAME}:${base_tag#v}")
          fi

          if [[ "$push_latest" == "true" ]]; then
            tags+=("${IMAGE_NAME}:latest")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.resolve_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
