version: 2
updates:
  # GitHub Actions used in .github/workflows/*.yml (auto-discovered)
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"

  # Base image in the Dockerfile at repo root
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns: ["*"]
    commit-message:
      prefix: "build"
